    <style>
      .dungeon-flex-row {
        display: flex;

        flex: 0 0 340px;

      @media (max-width: 900px) {
        .dungeon-flex-row {

      .dungeon-card, .dungeon-header, .dungeon-table-wrap, .dropdown-table, .dropdown-toggle, .dropdown-content, .system-table {

  <script src="../script.js"></script>
  <script>
    // --- Animated background: random lines (more, faster) ---
    const linesContainer = document.querySelector('.system-bg-lines');
    if (linesContainer && !linesContainer.hasChildNodes()) {
      for (let i = 0; i < 28; i++) {
        const line = document.createElement('div');
        line.className = 'system-bg-line';
        line.style.left = Math.random() * 100 + 'vw';
        line.style.top = Math.random() * 100 + 'vh';
        line.style.width = (100 + Math.random() * 220) + 'px';
        line.style.transform = `rotate(${Math.random() * 180 - 90}deg)`;
        line.style.opacity = 0.16 + Math.random() * 0.22;
        line.style.animationDelay = (Math.random() * 3) + 's';
        line.style.animationDuration = (6 + Math.random() * 5) + 's';
        linesContainer.appendChild(line);
      }
    }
    // --- Animated background: orbs (more, faster) ---
    const orbsContainer = document.querySelector('.system-bg-orbs');
    if (orbsContainer && !orbsContainer.hasChildNodes()) {
      for (let i = 0; i < 16; i++) {
        const orb = document.createElement('div');
        orb.className = 'system-bg-orb';
        orb.style.left = Math.random() * 100 + 'vw';
        orb.style.top = Math.random() * 100 + 'vh';
        orb.style.width = (40 + Math.random() * 120) + 'px';
        orb.style.height = orb.style.width;
        orb.style.opacity = 0.13 + Math.random() * 0.22;
        orb.style.animationDelay = (Math.random() * 4) + 's';
        orb.style.animationDuration = (8 + Math.random() * 7) + 's';
        orbsContainer.appendChild(orb);
      }
    }
    // --- Make rays and particles more active ---
    const rays = document.querySelector('.system-bg-rays');
    if (rays && !rays.hasChildNodes()) {
      for (let i = 0; i < 14; i++) {
        const r = document.createElement('div');
        r.className = 'system-ray';
        r.style.top = Math.random() * 100 + 'vh';
        r.style.animationDelay = (Math.random() * 4) + 's';
        r.style.animationDuration = (7 + Math.random() * 5) + 's';
        rays.appendChild(r);
      }
    }
    const bg = document.querySelector('.system-bg-particles');
    if (bg && !bg.hasChildNodes()) {
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDuration = (3 + Math.random() * 7) + 's';
        p.style.opacity = 0.18 + Math.random() * 0.32;
        bg.appendChild(p);
      }
    }
  </script>
