<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="8"/>
  <rect x="2" y="2" width="196" height="196" fill="none" stroke="#00d4ff" stroke-width="1.5" rx="7" opacity="0.7"/>
  <rect x="6" y="6" width="188" height="188" fill="none" stroke="#7b2fff" stroke-width="0.5" rx="5" opacity="0.4"/>
  
  <line x1="100" y1="25" x2="100" y2="155" stroke="#00d4ff" stroke-width="4" filter="url(#glow)"/>
  <polygon points="100,25 92,55 108,55" fill="#00d4ff" filter="url(#glow)"/>
  <rect x="80" y="100" width="40" height="8" rx="2" fill="#7b2fff" filter="url(#glow)"/>
  <rect x="93" y="108" width="14" height="30" rx="2" fill="#555"/>
  <line x1="92" y1="55" x2="100" y2="25" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="108" y1="55" x2="100" y2="25" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  
  <text x="100" y="182" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="11" filter="url(#glow)" opacity="0.9">Demon Slayer</text>
</svg>