<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="8"/>
  <rect x="2" y="2" width="196" height="196" fill="none" stroke="#ffcc00" stroke-width="1.5" rx="7" opacity="0.7"/>
  <rect x="6" y="6" width="188" height="188" fill="none" stroke="#ff8800" stroke-width="0.5" rx="5" opacity="0.4"/>
  
  <path d="M75,30 Q55,100 75,170" fill="none" stroke="#ffcc00" stroke-width="3" filter="url(#glow)"/>
  <line x1="75" y1="30" x2="75" y2="170" stroke="#ffcc00" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="75" y1="100" x2="110" y2="100" stroke="#ffcc00" stroke-width="1.5"/>
  <polygon points="110,96 125,100 110,104" fill="#ffcc00" filter="url(#glow)"/>
  
  <text x="100" y="182" text-anchor="middle" fill="#ffcc00" font-family="monospace" font-size="11" filter="url(#glow)" opacity="0.9">Thunder Bow</text>
</svg>