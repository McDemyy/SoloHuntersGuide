<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="8"/>
  <rect x="2" y="2" width="196" height="196" fill="none" stroke="#00d4ff" stroke-width="1.5" rx="7" opacity="0.7"/>
  <rect x="6" y="6" width="188" height="188" fill="none" stroke="#0088ff" stroke-width="0.5" rx="5" opacity="0.4"/>
  
  <ellipse cx="100" cy="100" rx="55" ry="70" fill="none" stroke="#00d4ff" stroke-width="2.5" filter="url(#glow)"/>
  <ellipse cx="100" cy="100" rx="45" ry="60" fill="#001020" stroke="#66eeff" stroke-width="1" opacity="0.8"/>
  <ellipse cx="100" cy="100" rx="30" ry="40" fill="#0088ff" opacity="0.15" filter="url(#glow)"/>
  <line x1="100" y1="30" x2="100" y2="170" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="45" y1="100" x2="155" y2="100" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  
  <text x="100" y="182" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="11" filter="url(#glow)" opacity="0.9">Blue Gate</text>
</svg>