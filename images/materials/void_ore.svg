<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="8"/>
  <rect x="2" y="2" width="196" height="196" fill="none" stroke="#9955ff" stroke-width="1.5" rx="7" opacity="0.7"/>
  <rect x="6" y="6" width="188" height="188" fill="none" stroke="#7b2fff" stroke-width="0.5" rx="5" opacity="0.4"/>
  
  <polygon points="100,40 125,70 125,130 100,155 75,130 75,70" fill="none" stroke="#9955ff" stroke-width="2" filter="url(#glow)"/>
  <polygon points="100,40 125,70 125,130 100,155 75,130 75,70" fill="#5500ff" opacity="0.12"/>
  <line x1="75" y1="70" x2="125" y2="130" stroke="#9955ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="125" y1="70" x2="75" y2="130" stroke="#9955ff" stroke-width="0.8" opacity="0.5"/>
  
  <text x="100" y="182" text-anchor="middle" fill="#9955ff" font-family="monospace" font-size="11" filter="url(#glow)" opacity="0.9">Void Ore</text>
</svg>