  <rect width="200" height="200" fill="url(#bg)" rx="8"/>
  <rect x="2" y="2" width="196" height="196" fill="none" stroke="#88ddff" stroke-width="1.5" rx="7" opacity="0.7"/>
  <rect x="6" y="6" width="188" height="188" fill="none" stroke="#00d4ff" stroke-width="0.5" rx="5" opacity="0.4"/>
  
  <polygon points="100,40 115,70 145,80 122,100 128,130 100,115 72,130 78,100 55,80 85,70" fill="none" stroke="#88ddff" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="100,40 115,70 145,80 122,100 128,130 100,115 72,130 78,100 55,80 85,70" fill="#88ddff" opacity="0.1"/>
  <circle cx="100" cy="88" r="10" fill="#88ddff" opacity="0.4" filter="url(#glow)"/>
  
  <text x="100" y="182" text-anchor="middle" fill="#88ddff" font-family="monospace" font-size="11" filter="url(#glow)" opacity="0.9">Ice Fragment</text>
