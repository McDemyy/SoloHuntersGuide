<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="8"/>
  <rect x="2" y="2" width="196" height="196" fill="none" stroke="#00d4ff" stroke-width="1.5" rx="7" opacity="0.7"/>
  <rect x="6" y="6" width="188" height="188" fill="none" stroke="#7b2fff" stroke-width="0.5" rx="5" opacity="0.4"/>
  
  <rect x="70" y="35" width="60" height="70" rx="5" fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#glow)"/>
  <rect x="55" y="50" width="20" height="50" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="125" y="50" width="20" height="50" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="75" y="105" width="50" height="50" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="100" cy="70" r="10" fill="#00d4ff" opacity="0.3" filter="url(#glow)"/>
  
  <text x="100" y="182" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="11" filter="url(#glow)" opacity="0.9">Hunter Plate</text>
</svg>