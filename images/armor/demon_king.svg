<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="8"/>
  <rect x="2" y="2" width="196" height="196" fill="none" stroke="#ff3366" stroke-width="1.5" rx="7" opacity="0.7"/>
  <rect x="6" y="6" width="188" height="188" fill="none" stroke="#7b2fff" stroke-width="0.5" rx="5" opacity="0.4"/>
  
  <polygon points="100,25 115,45 140,40 125,60 135,85 110,75 100,95 90,75 65,85 75,60 60,40 85,45" fill="none" stroke="#ff3366" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="75" y="95" width="50" height="55" rx="4" fill="none" stroke="#ff3366" stroke-width="1.5"/>
  <circle cx="100" cy="65" r="12" fill="#ff3366" opacity="0.3" filter="url(#glow)"/>
  
  <text x="100" y="182" text-anchor="middle" fill="#ff3366" font-family="monospace" font-size="11" filter="url(#glow)" opacity="0.9">Demon King</text>
</svg>