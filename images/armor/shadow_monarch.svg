<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="8"/>
  <rect x="2" y="2" width="196" height="196" fill="none" stroke="#7b2fff" stroke-width="1.5" rx="7" opacity="0.7"/>
  <rect x="6" y="6" width="188" height="188" fill="none" stroke="#00d4ff" stroke-width="0.5" rx="5" opacity="0.4"/>
  
  <polygon points="100,30 130,60 140,100 130,140 100,160 70,140 60,100 70,60" fill="none" stroke="#7b2fff" stroke-width="2" filter="url(#glow)"/>
  <polygon points="100,50 120,70 128,100 120,130 100,145 80,130 72,100 80,70" fill="#1a0a2e" stroke="#00d4ff" stroke-width="1"/>
  <circle cx="100" cy="100" r="15" fill="#7b2fff" opacity="0.6" filter="url(#glow)"/>
  <line x1="100" y1="50" x2="100" y2="145" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="72" y1="100" x2="128" y2="100" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  
  <text x="100" y="182" text-anchor="middle" fill="#7b2fff" font-family="monospace" font-size="11" filter="url(#glow)" opacity="0.9">Shadow Monarch</text>
</svg>