  <rect width="200" height="200" fill="url(#bg)" rx="8"/>
  <rect x="2" y="2" width="196" height="196" fill="none" stroke="#aaaaaa" stroke-width="1.5" rx="7" opacity="0.7"/>
  <rect x="6" y="6" width="188" height="188" fill="none" stroke="#888888" stroke-width="0.5" rx="5" opacity="0.4"/>
  
  <rect x="65" y="40" width="70" height="65" rx="6" fill="none" stroke="#888" stroke-width="2.5"/>
  <rect x="50" y="55" width="22" height="45" rx="3" fill="none" stroke="#aaa" stroke-width="1.5"/>
