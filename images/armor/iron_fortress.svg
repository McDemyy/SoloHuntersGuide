  <line x1="65" y1="72" x2="135" y2="72" stroke="#666" stroke-width="1"/>
  
  <text x="100" y="182" text-anchor="middle" fill="#aaaaaa" font-family="monospace" font-size="11" filter="url(#glow)" opacity="0.9">Iron Fortress</text>
